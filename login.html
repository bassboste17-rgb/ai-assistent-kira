<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ავტორიზაცია — DAMQ Travel</title>
  <link rel="icon" type="image/png" href="images/logodamq.png">
  <link rel="apple-touch-icon" href="images/logodamq.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content">
      <div class="spinner"></div>
      <div class="loading-text" data-i18n="login.loading">Загрузка...</div>
    </div>
  </div>

  <!-- Auth Page -->
  <div class="auth-page">
    <!-- Language Switcher -->
    <div class="lang-switcher" id="langSwitcher">
      <button class="lang-toggle" id="langToggle">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span id="langLabel">RU</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="lang-dropdown" id="langDropdown">
        <button class="lang-option active" data-lang="ru">
          <span class="lang-flag">RU</span>
          <span>Русский</span>
        </button>
        <button class="lang-option" data-lang="en">
          <span class="lang-flag">EN</span>
          <span>English</span>
        </button>
        <button class="lang-option" data-lang="ka">
          <span class="lang-flag">KA</span>
          <span>ქართული</span>
        </button>
      </div>
    </div>
    
    <div class="auth-card" id="authCard">
      <!-- Logo -->
      <div class="auth-logo">
        <img src="images/logodamq.png" alt="DAMQ Logo" class="logo-icon">
        <span class="logo-text">DAMQ</span>
        <span class="logo-divider"></span>
        <span class="logo-sub" data-i18n="login.admin.panel">Админ панель</span>
      </div>

      <!-- Messages (shared between forms) -->
      <div id="authError" class="auth-error"></div>
      <div id="authSuccess" class="auth-success"></div>

      <!-- Login Form -->
      <form class="auth-form active" id="loginForm">
        <h1 class="auth-title" data-i18n="login.title">Вход</h1>
        <p class="auth-subtitle" data-i18n="login.subtitle">Введите данные для входа в админ панель</p>

        <div class="form-group">
          <label for="loginEmail" data-i18n="login.email">Эл. почта</label>
          <input 
            type="email" 
            id="loginEmail" 
            placeholder="example@mail.com"
            data-i18n-ph="login.email.ph"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label for="loginPassword" data-i18n="login.password">Пароль</label>
          <div class="password-wrap">
            <input 
              type="password" 
              id="loginPassword" 
              placeholder="Введите пароль"
              data-i18n-ph="login.password.ph"
              autocomplete="current-password"
              required
            >
            <button type="button" class="password-toggle" id="toggleLoginPass">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-auth" id="loginBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          <span data-i18n="login.btn">Войти</span>
        </button>

        <div class="auth-switch">
          <span data-i18n="login.no.account">Нет аккаунта?</span> <a href="#" id="showRegister" data-i18n="login.register">Регистрация</a>
        </div>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="registerForm">
        <h1 class="auth-title" data-i18n="register.title">Регистрация</h1>
        <p class="auth-subtitle" data-i18n="register.subtitle">Создайте новый аккаунт для админ панели</p>

        <div class="form-group">
          <label for="registerName" data-i18n="register.name">Имя</label>
          <input 
            type="text" 
            id="registerName" 
            placeholder="Ваше имя"
            data-i18n-ph="register.name.ph"
            autocomplete="name"
            required
          >
        </div>

        <div class="form-group">
          <label for="registerEmail" data-i18n="login.email">Эл. почта</label>
          <input 
            type="email" 
            id="registerEmail" 
            placeholder="example@mail.com"
            data-i18n-ph="login.email.ph"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label for="registerPassword" data-i18n="login.password">Пароль</label>
          <div class="password-wrap">
            <input 
              type="password" 
              id="registerPassword" 
              placeholder="Минимум 6 символов"
              data-i18n-ph="register.password.ph"
              autocomplete="new-password"
              required
            >
            <button type="button" class="password-toggle" id="toggleRegisterPass">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="registerConfirmPassword" data-i18n="register.confirm">Подтвердите пароль</label>
          <div class="password-wrap">
            <input 
              type="password" 
              id="registerConfirmPassword" 
              placeholder="Повторите пароль"
              data-i18n-ph="register.confirm.ph"
              autocomplete="new-password"
              required
            >
            <button type="button" class="password-toggle" id="toggleRegisterConfirmPass">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-auth" id="registerBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" y1="8" x2="20" y2="14"/>
            <line x1="23" y1="11" x2="17" y2="11"/>
          </svg>
          <span data-i18n="register.btn">Зарегистрироваться</span>
        </button>

        <div class="auth-switch">
          <span data-i18n="login.has.account">Уже есть аккаунт?</span> <a href="#" id="showLogin" data-i18n="login.title">Вход</a>
        </div>
      </form>

      <!-- Back to Site Link -->
      <a href="index.html" class="back-to-site">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        <span data-i18n="login.back">Вернуться на главную</span>
      </a>
    </div>
  </div>

  <!-- Translations Script -->
  <script src="js/translations.js"></script>
  
  <!-- Language Switcher Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Restore saved language
      const savedLang = localStorage.getItem('damq_lang') || 'ru';
      setLanguage(savedLang);
      
      // Language switcher toggle
      const switcher = document.getElementById('langSwitcher');
      const toggle = document.getElementById('langToggle');
      
      if (toggle && switcher) {
        toggle.addEventListener('click', (e) => {
          e.stopPropagation();
          switcher.classList.toggle('active');
        });
        
        document.addEventListener('click', (e) => {
          if (!switcher.contains(e.target)) {
            switcher.classList.remove('active');
          }
        });
      }
      
      // Language option click
      document.querySelectorAll('.lang-option').forEach(opt => {
        opt.addEventListener('click', () => {
          const lang = opt.getAttribute('data-lang');
          setLanguage(lang);
          if (switcher) switcher.classList.remove('active');
        });
      });
    });
    
    function setLanguage(lang) {
      localStorage.setItem('damq_lang', lang);
      
      // Update label
      const langLabel = document.getElementById('langLabel');
      if (langLabel) langLabel.textContent = lang.toUpperCase();
      
      // Sync options
      document.querySelectorAll('.lang-option').forEach(opt => {
        opt.classList.toggle('active', opt.getAttribute('data-lang') === lang);
      });
      
      // Translate elements
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const val = window.t ? window.t(key, lang) : key;
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
          el.placeholder = val;
        } else {
          el.innerHTML = val;
        }
      });
      
      // Translate placeholders
      document.querySelectorAll('[data-i18n-ph]').forEach(el => {
        const key = el.getAttribute('data-i18n-ph');
        const val = window.t ? window.t(key, lang) : key;
        el.placeholder = val;
      });
      
      // Update HTML lang
      document.documentElement.lang = lang === 'ka' ? 'ka' : lang === 'en' ? 'en' : 'ru';
    }
  </script>

  <!-- Auth Script -->
  <script type="module" src="js/auth.js"></script>
  <script src="js/url-rewrite.js"></script>
</body>
</html>
