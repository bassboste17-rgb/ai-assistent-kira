<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Загрузка тура... — DAMQ Travel</title>
  <meta name="description" content="Подробная информация о туре — DAMQ Travel">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="icon-dark-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    :root {
      --gold: #d4af37;
      --gold-hover: #f0c040;
      --dark: #0a0a0a;
      --text: #1a1a1a;
      --muted: #777;
      --border: #f0ede6;
      --bg: #faf9f6;
      --white: #fff;
      --radius: 20px;
    }

    /* Page Hero */
    .tour-hero {
      position: relative;
      min-height: 60vh;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      background: var(--dark);
      padding-top: 80px;
    }
    .tour-hero-bg {
      position: absolute;
      inset: 0;
    }
    .tour-hero-bg img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.55;
    }
    .tour-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, rgba(10,10,10,0.9) 0%, rgba(10,10,10,0.3) 50%, rgba(10,10,10,0.5) 100%);
    }
    .tour-hero-content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }
    .tour-breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 1.5rem;
    }
    .tour-breadcrumb a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      transition: color 0.2s;
    }
    .tour-breadcrumb a:hover { color: var(--gold); }
    .tour-badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }
    .tour-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(212,175,55,0.15);
      border: 1px solid rgba(212,175,55,0.4);
      color: var(--gold);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 50px;
    }
    .tour-promo-badge {
      background: var(--gold);
      color: var(--dark);
      border: none;
    }
    .tour-hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 1rem;
    }
    .tour-hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      color: rgba(255,255,255,0.7);
      font-size: 0.95rem;
    }
    .tour-hero-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tour-hero-meta-item svg { color: var(--gold); }

    /* Content Grid */
    .tour-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 2.5rem;
    }
    @media (max-width: 900px) {
      .tour-content { grid-template-columns: 1fr; }
    }

    /* Main Content */
    .tour-main {}
    .tour-section {
      margin-bottom: 2.5rem;
    }
    .tour-section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tour-section-title svg { color: var(--gold); }
    .tour-desc {
      font-size: 1.02rem;
      color: #444;
      line-height: 1.8;
    }

    /* Highlights */
    .tour-highlights {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    .highlight-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.2rem;
    }
    .highlight-icon {
      width: 40px; height: 40px;
      background: rgba(212,175,55,0.12);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
      flex-shrink: 0;
    }
    .highlight-text h4 {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 2px;
    }
    .highlight-text p {
      font-size: 0.82rem;
      color: var(--muted);
    }

    /* Sidebar */
    .tour-sidebar {}
    .booking-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.8rem;
      position: sticky;
      top: 100px;
    }
    .booking-price {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 1.2rem;
    }
    .booking-price-value {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--dark);
    }
    .booking-price-unit {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .booking-rating {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .booking-rating svg { color: var(--gold); }
    .booking-rating span { font-size: 0.9rem; color: #555; font-weight: 600; }

    .booking-details {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .booking-detail {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.92rem;
      color: #444;
    }
    .booking-detail svg { color: var(--gold); flex-shrink: 0; }

    .btn-book-now {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--gold);
      color: var(--dark);
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      padding: 1rem;
      border-radius: 12px;
      transition: background 0.25s, transform 0.2s;
      margin-bottom: 0.8rem;
    }
    .btn-book-now:hover { background: var(--gold-hover); transform: translateY(-2px); }

    .btn-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: #25d366;
      color: #fff;
      font-size: 0.92rem;
      font-weight: 600;
      text-decoration: none;
      padding: 0.85rem;
      border-radius: 12px;
      transition: background 0.25s;
    }
    .btn-whatsapp:hover { background: #1ebe5d; }

    .booking-note {
      margin-top: 1.2rem;
      padding: 1rem;
      background: rgba(212,175,55,0.08);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 10px;
      font-size: 0.82rem;
      color: #666;
      line-height: 1.6;
    }
    .booking-note strong { color: var(--dark); }

    /* Loading State */
    .tour-loading {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--muted);
    }
    .tour-loading .spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error State */
    .tour-error {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .tour-error svg { color: #ddd; margin-bottom: 1rem; }
    .tour-error h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--dark);
      margin-bottom: 0.6rem;
    }
    .tour-error p { color: var(--muted); margin-bottom: 1.5rem; }
    .tour-error .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--dark);
      color: #fff;
      padding: 0.8rem 1.8rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.25s;
    }
    .tour-error .btn-back:hover { background: var(--gold); color: var(--dark); }

    /* Back Button */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.6);
      font-size: 0.88rem;
      text-decoration: none;
      transition: color 0.2s;
      margin-bottom: 1rem;
    }
    .back-link:hover { color: var(--gold); }
  </style>
</head>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyATX_3r8vsgBU_iHWPTI11Q_vvIXRQhRB0",
      authDomain: "damqtravel.firebaseapp.com",
      databaseURL: "https://damqtravel-default-rtdb.firebaseio.com",
      projectId: "damqtravel",
      storageBucket: "damqtravel.firebasestorage.app",
      messagingSenderId: "84352735773",
      appId: "1:84352735773:web:ec9095f9020b630b1884f4",
      measurementId: "G-3TFFBQWHNM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    async function getTourById(collection, id) {
      const snap = await get(ref(db, `${collection}/${id}`));
      if (!snap.exists()) return null;
      return { id, ...snap.val() };
    }

    function renderError() {
      document.getElementById('tourContainer').innerHTML = `
        <div class="tour-error">
          <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <h2>Тур не найден</h2>
          <p>К сожалению, запрашиваемый тур не существует или был удален.</p>
          <a href="services.html" class="btn-back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Вернуться к турам
          </a>
        </div>
      `;
    }

    function renderTour(tour, type) {
      const isFullTour = type === 'full';
      const typeName = isFullTour ? 'Пакет тура' : 'Однодневный тур';
      
      document.title = `${tour.title} — DAMQ Travel`;

      document.getElementById('tourContainer').innerHTML = `
        <section class="tour-hero">
          <div class="tour-hero-bg">
            <img src="${tour.imageUrl || 'images/hero-georgia.jpg'}" alt="${tour.title}" id="heroBg">
          </div>
          <div class="tour-hero-overlay"></div>
          <div class="tour-hero-content">
            <a href="services.html" class="back-link">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
              Назад к турам
            </a>
            <div class="tour-badge-row">
              <span class="tour-type-badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${typeName}
              </span>
              ${tour.badge ? `<span class="tour-type-badge tour-promo-badge">${tour.badge}</span>` : ''}
            </div>
            <h1 class="tour-hero-title">${tour.title}</h1>
            <div class="tour-hero-meta">
              ${tour.duration ? `
                <div class="tour-hero-meta-item">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  ${tour.duration}
                </div>
              ` : ''}
              ${tour.groupSize ? `
                <div class="tour-hero-meta-item">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                  ${tour.groupSize}
                </div>
              ` : ''}
              ${tour.location ? `
                <div class="tour-hero-meta-item">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  ${tour.location}
                </div>
              ` : ''}
              ${tour.rating ? `
                <div class="tour-hero-meta-item">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                  ${tour.rating}
                </div>
              ` : ''}
            </div>
          </div>
        </section>

        <div class="tour-content">
          <div class="tour-main">
            <div class="tour-section">
              <h2 class="tour-section-title">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
                Описание тура
              </h2>
              <p class="tour-desc">${tour.description || 'Описание тура будет добавлено в ближайшее время.'}</p>
            </div>

            <div class="tour-section">
              <h2 class="tour-section-title">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                Что включено
              </h2>
              <div class="tour-highlights">
                <div class="highlight-item">
                  <div class="highlight-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                  </div>
                  <div class="highlight-text">
                    <h4>Комфортный транспорт</h4>
                    <p>Современные авто с кондиционером</p>
                  </div>
                </div>
                <div class="highlight-item">
                  <div class="highlight-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                  </div>
                  <div class="highlight-text">
                    <h4>Профессиональный гид</h4>
                    <p>На русском/английском языке</p>
                  </div>
                </div>
                <div class="highlight-item">
                  <div class="highlight-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  </div>
                  <div class="highlight-text">
                    <h4>Все входные билеты</h4>
                    <p>Музеи и достопримечательности</p>
                  </div>
                </div>
                <div class="highlight-item">
                  <div class="highlight-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  </div>
                  <div class="highlight-text">
                    <h4>Гибкое время</h4>
                    <p>Индивидуальный график</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <aside class="tour-sidebar">
            <div class="booking-card">
              <div class="booking-price">
                <span class="booking-price-value">$${tour.price || '—'}</span>
                <span class="booking-price-unit">/ чел.</span>
              </div>
              ${tour.rating ? `
                <div class="booking-rating">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                  <span>${tour.rating} / 5</span>
                </div>
              ` : ''}
              <div class="booking-details">
                ${tour.duration ? `
                  <div class="booking-detail">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span>Длительность: ${tour.duration}</span>
                  </div>
                ` : ''}
                ${tour.groupSize ? `
                  <div class="booking-detail">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                    <span>Группа: ${tour.groupSize}</span>
                  </div>
                ` : ''}
                <div class="booking-detail">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                  <span>Бесплатная отмена за 48ч</span>
                </div>
              </div>
              <a href="contact.html?tour=${encodeURIComponent(tour.title)}" class="btn-book-now">
                Забронировать
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </a>
              <a href="https://wa.me/995555000000?text=${encodeURIComponent('Здравствуйте! Интересует тур: ' + tour.title)}" class="btn-whatsapp" target="_blank">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Написать в WhatsApp
              </a>
              <div class="booking-note">
                <strong>Оплата:</strong> Предоплата 30%, остальное — в день тура. Принимаем наличные и карты.
              </div>
            </div>
          </aside>
        </div>
      `;
    }

    // Parse URL params
    const params = new URLSearchParams(window.location.search);
    const tourId = params.get('id');
    const tourType = params.get('type'); // 'full' or 'day'

    if (!tourId || !tourType) {
      renderError();
    } else {
      try {
        const collection = tourType === 'full' ? 'fullTours' : 'dayTours';
        const tour = await getTourById(collection, tourId);
        
        if (tour) {
          renderTour(tour, tourType);
        } else {
          renderError();
        }
      } catch (e) {
        console.error('Firebase error:', e);
        renderError();
      }
    }
  </script>
</body>
</html>
