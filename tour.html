<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ტურის დეტალები — DAMQ Travel</title>
  <meta name="description" content="DAMQ Travel — პრემიუმ ტურები საქართველოში">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="icon-dark-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --gold: #d4af37;
      --gold-hover: #f0c040;
      --dark: #0a0a0a;
      --text: #1a1a1a;
      --muted: #777;
      --border: #f0ede6;
      --bg: #faf9f6;
      --white: #fff;
      --radius: 20px;
    }

    /* Hero */
    .tour-hero {
      position: relative;
      min-height: 520px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      background: var(--dark);
      padding-top: 80px;
    }
    .tour-hero-bg {
      position: absolute;
      inset: 0;
    }
    .tour-hero-bg img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.5;
    }
    .tour-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.3) 60%, rgba(10,10,10,0.5) 100%);
    }
    .tour-hero-content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }
    .tour-badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .tour-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(212,175,55,0.15);
      border: 1px solid rgba(212,175,55,0.4);
      color: var(--gold);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 50px;
    }
    .tour-badge.dark {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
      color: #fff;
    }
    .tour-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: #fff;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1rem;
    }
    .tour-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      color: rgba(255,255,255,0.75);
      font-size: 0.95rem;
    }
    .tour-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tour-meta-item svg { color: var(--gold); }

    /* Main content */
    .tour-main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 3rem;
    }
    @media (max-width: 900px) {
      .tour-main { grid-template-columns: 1fr; }
    }

    /* Left column */
    .tour-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 1rem;
      margin-top: 2.5rem;
    }
    .tour-content h2:first-child { margin-top: 0; }
    .tour-content p {
      font-size: 1rem;
      color: #444;
      line-height: 1.8;
      margin-bottom: 1rem;
    }
    .tour-route {
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(212,175,55,0.08), rgba(212,175,55,0.03));
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 14px;
      padding: 1rem 1.4rem;
      margin-bottom: 1.5rem;
      color: var(--dark);
      font-weight: 600;
    }
    .tour-route svg { color: var(--gold); flex-shrink: 0; }

    /* Regions */
    .regions-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .region-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--dark);
    }
    .region-chip svg { color: var(--gold); }

    /* Gallery */
    .tour-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .gallery-item {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      aspect-ratio: 4/3;
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .gallery-item:hover img { transform: scale(1.05); }

    /* Sidebar */
    .tour-sidebar {
      position: sticky;
      top: 100px;
      height: fit-content;
    }
    .booking-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 12px 40px rgba(0,0,0,0.06);
    }
    .booking-price {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .booking-price-value {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--dark);
      line-height: 1;
    }
    .booking-price-label {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .booking-details {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .booking-detail {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.92rem;
      color: #444;
    }
    .booking-detail svg { color: var(--gold); flex-shrink: 0; }
    .btn-book-main {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--dark);
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      font-weight: 700;
      transition: background 0.25s, transform 0.2s;
      margin-bottom: 0.8rem;
    }
    .btn-book-main:hover { background: var(--gold); color: var(--dark); transform: translateY(-2px); }
    .btn-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: #25d366;
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      font-weight: 700;
      transition: background 0.25s, transform 0.2s;
    }
    .btn-whatsapp:hover { background: #20bd5a; transform: translateY(-2px); }

    /* Loading */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 3rem 1.5rem;
    }
    .loading-spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--muted); font-size: 1rem; }

    /* Error */
    .error-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 3rem 1.5rem;
    }
    .error-wrap svg { color: #e55; margin-bottom: 1.5rem; }
    .error-wrap h2 { font-size: 1.4rem; color: var(--dark); margin-bottom: 0.5rem; }
    .error-wrap p { color: var(--muted); margin-bottom: 1.5rem; }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--dark);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      padding: 0.8rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .btn-back:hover { background: var(--gold); color: var(--dark); }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.95);
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
    }
    .lightbox-close {
      position: absolute;
      top: 1.5rem; right: 1.5rem;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 50%;
      width: 48px; height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyATX_3r8vsgBU_iHWPTI11Q_vvIXRQhRB0",
      authDomain: "damqtravel.firebaseapp.com",
      databaseURL: "https://damqtravel-default-rtdb.firebaseio.com",
      projectId: "damqtravel",
      storageBucket: "damqtravel.firebasestorage.app",
      messagingSenderId: "84352735773",
      appId: "1:84352735773:web:ec9095f9020b630b1884f4",
      measurementId: "G-3TFFBQWHNM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function toArray(val) {
      if (!val) return [];
      if (Array.isArray(val)) return val;
      if (typeof val === 'object') return Object.values(val);
      return [];
    }

    // Get URL params
    const params = new URLSearchParams(window.location.search);
    const tourType = params.get('type') || 'day';
    const tourId = params.get('id');

    if (!tourId) {
      showError();
    } else {
      loadTour();
    }

    async function loadTour() {
      try {
        const collection = tourType === 'multi' ? 'multiDayTours' : 'dayTours';
        const snap = await get(ref(db, `${collection}/${tourId}`));
        
        if (!snap.exists()) {
          showError();
          return;
        }

        const tour = { id: tourId, ...snap.val() };
        renderTour(tour);
        
      } catch (e) {
        console.error('Firebase error:', e);
        showError();
      }
    }

    function showError() {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'flex';
    }

    function renderTour(t) {
      const photos = toArray(t.photos);
      const regions = toArray(t.regions);

      // Update page title
      document.title = `${t.name || 'ტური'} — DAMQ Travel`;

      // Hero image
      if (photos.length) {
        document.getElementById('heroImage').src = photos[0].url || photos[0].thumb;
        document.getElementById('heroImage').alt = t.name || '';
      }

      // Badges
      const badgeRow = document.getElementById('badgeRow');
      let badges = '';
      if (t.type) badges += `<span class="tour-badge">${t.type}</span>`;
      if (tourType === 'multi') {
        const dur = [];
        if (t.days) dur.push(t.days + ' დღე');
        if (t.nights) dur.push(t.nights + ' ღამე');
        if (dur.length) badges += `<span class="tour-badge dark">${dur.join(' / ')}</span>`;
      } else {
        const dur = [];
        if (t.days) dur.push(t.days + ' დღე');
        if (t.hours) dur.push(t.hours + ' საათი');
        if (dur.length) badges += `<span class="tour-badge dark">${dur.join(' / ')}</span>`;
      }
      badgeRow.innerHTML = badges;

      // Title
      document.getElementById('tourTitle').textContent = t.name || 'უსახელო ტური';

      // Meta row
      const metaRow = document.getElementById('tourMetaRow');
      let metaHTML = '';
      if (regions.length) {
        metaHTML += `<span class="tour-meta-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${regions.join(', ')}</span>`;
      }
      if (t.minGroup && t.maxGroup) {
        metaHTML += `<span class="tour-meta-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>${t.minGroup}-${t.maxGroup} პერსონა</span>`;
      }
      metaRow.innerHTML = metaHTML;

      // Content
      const content = document.getElementById('tourContentInner');
      let contentHTML = '';

      // Route (for multi-day)
      if (t.route) {
        contentHTML += `
          <div class="tour-route">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span>${t.route}</span>
          </div>`;
      }

      // Description
      if (t.desc) {
        contentHTML += `<h2>აღწერა</h2><p>${t.desc}</p>`;
      }

      // Regions
      if (regions.length) {
        contentHTML += `<h2>რეგიონები</h2><div class="regions-grid">`;
        regions.forEach(r => {
          contentHTML += `<span class="region-chip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${r}</span>`;
        });
        contentHTML += `</div>`;
      }

      // Gallery
      if (photos.length > 1) {
        contentHTML += `<h2>ფოტო გალერეა</h2><div class="tour-gallery">`;
        photos.forEach((p, i) => {
          contentHTML += `<div class="gallery-item" data-img="${p.url || p.thumb}"><img src="${p.thumb || p.url}" alt="ფოტო ${i+1}" loading="lazy"></div>`;
        });
        contentHTML += `</div>`;
      }

      content.innerHTML = contentHTML;

      // Booking sidebar
      document.getElementById('bookingPrice').textContent = `$${t.price || '—'}`;

      const details = document.getElementById('bookingDetails');
      let detailsHTML = '';
      
      if (tourType === 'multi') {
        if (t.days) detailsHTML += `<div class="booking-detail"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${t.days} დღე${t.nights ? ', ' + t.nights + ' ღამე' : ''}</div>`;
      } else {
        const dur = [];
        if (t.days) dur.push(t.days + ' დღე');
        if (t.hours) dur.push(t.hours + ' საათი');
        if (dur.length) detailsHTML += `<div class="booking-detail"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${dur.join(', ')}</div>`;
      }
      
      if (t.minGroup && t.maxGroup) {
        detailsHTML += `<div class="booking-detail"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>${t.minGroup}-${t.maxGroup} პერსონა</div>`;
      }
      
      if (t.type) {
        detailsHTML += `<div class="booking-detail"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>${t.type}</div>`;
      }
      
      if (regions.length) {
        detailsHTML += `<div class="booking-detail"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${regions.slice(0, 2).join(', ')}${regions.length > 2 ? '...' : ''}</div>`;
      }

      details.innerHTML = detailsHTML;

      // Show content
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('tourContent').style.display = 'block';

      // Gallery lightbox
      document.querySelectorAll('.gallery-item').forEach(item => {
        item.addEventListener('click', () => {
          document.getElementById('lightboxImg').src = item.dataset.img;
          document.getElementById('lightbox').classList.add('open');
        });
      });
    }

    // Lightbox close
    document.getElementById('lightboxClose').addEventListener('click', () => {
      document.getElementById('lightbox').classList.remove('open');
    });
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target === document.getElementById('lightbox')) {
        document.getElementById('lightbox').classList.remove('open');
      }
    });
  </script>
</body>
</html>
